services:
  postgres:
    image: postgres:16-alpine
    container_name: authapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - authapi_pgdata:/var/lib/postgresql/data

volumes:
  authapi_pgdata:

