services:
  postgres:
    image: postgres:16-alpine
    container_name: debouncing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: debounce_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - debouncing_pgdata:/var/lib/postgresql/data

volumes:
  debouncing_pgdata:

