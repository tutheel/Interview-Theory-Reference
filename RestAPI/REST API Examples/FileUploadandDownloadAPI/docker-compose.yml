services:
  postgres:
    image: postgres:16-alpine
    container_name: fileuploadanddownloadapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: files_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - fileuploadanddownloadapi_pgdata:/var/lib/postgresql/data

volumes:
  fileuploadanddownloadapi_pgdata:

