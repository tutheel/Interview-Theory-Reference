services:
  postgres:
    image: postgres:16-alpine
    container_name: queryreadapis-search-filter-pagination-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queryread_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - queryreadapissearchfilterpagination_pgdata:/var/lib/postgresql/data

volumes:
  queryreadapissearchfilterpagination_pgdata:

