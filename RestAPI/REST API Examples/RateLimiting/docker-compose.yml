services:
  postgres:
    image: postgres:16-alpine
    container_name: ratelimiting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ratelimit_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ratelimiting_pgdata:/var/lib/postgresql/data

volumes:
  ratelimiting_pgdata:

