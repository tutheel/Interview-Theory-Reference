services:
  postgres:
    image: postgres:16-alpine
    container_name: simplewebhookexample-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - simplewebhookexample_pgdata:/var/lib/postgresql/data

volumes:
  simplewebhookexample_pgdata:

