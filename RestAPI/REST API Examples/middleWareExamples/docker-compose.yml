services:
  postgres:
    image: postgres:16-alpine
    container_name: middlewareexamples-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: middleware_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - middlewareexamples_pgdata:/var/lib/postgresql/data

volumes:
  middlewareexamples_pgdata:

