services:
  postgres:
    image: postgres:16-alpine
    container_name: weatherapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weather_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - weatherapi_pgdata:/var/lib/postgresql/data

volumes:
  weatherapi_pgdata:

